<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="Abraham Lopez">
<meta name="description" content="A temple picture album showcasing temples from around the world, featuring responsive design with CSS Grid and Flexbox. Created by Abraham Lopez for WDD 131 at BYU-Idaho.">  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album – Abraham Lopez – WDD 131</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">
  <script src="scripts/temples.js" defer></script>
</head>
<body>

  <header>
    <p class="site-title">Temple Album</p>
    <button id="hamburger" aria-label="Toggle navigation menu">&#9776;</button>
    <nav id="main-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Old</a></li>
        <li><a href="#">New</a></li>
        <li><a href="#">Large</a></li>
        <li><a href="#">Small</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Featured Temples</h1>

    <div class="gallery">

      <figure>
        <img src="images/salt-lake-temple.jpg" alt="Salt Lake Temple in Salt Lake City, Utah" loading="lazy" width="600" height="400">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img src="images/provo-temple.jpg" alt="Provo Utah Temple with mountains in the background" loading="lazy" width="600" height="400">
        <figcaption>Provo Utah Temple</figcaption>
      </figure>

      <figure>
        <img src="images/manti-temple.jpg" alt="Manti Utah Temple on a green hill" loading="lazy" width="600" height="400">
        <figcaption>Manti Utah Temple</figcaption>
      </figure>

      <figure>
        <img src="images/nauvoo-temple.jpg" alt="Nauvoo Illinois Temple on a sunny day" loading="lazy" width="600" height="400">
        <figcaption>Nauvoo Illinois Temple</figcaption>
      </figure>

      <figure>
        <img src="images/logan-temple.jpg" alt="Logan Utah Temple in winter with pink sky" loading="lazy" width="600" height="400">
        <figcaption>Logan Utah Temple</figcaption>
      </figure>

      <figure>
        <img src="images/mexico-city-temple.jpg" alt="Mexico City Temple at dusk" loading="lazy" width="600" height="400">
        <figcaption>Mexico City Temple</figcaption>
      </figure>

      <figure>
        <img src="images/monterrey-temple.jpg" alt="Monterrey Mexico Temple at night with mountains" loading="lazy" width="600" height="400">
        <figcaption>Monterrey Mexico Temple</figcaption>
      </figure>

      <figure>
        <img src="images/guadalajara-temple.jpg" alt="Guadalajara Mexico Temple with palm trees" loading="lazy" width="600" height="400">
        <figcaption>Guadalajara Mexico Temple</figcaption>
      </figure>

      <figure>
        <img src="images/rexburg-temple.jpg" alt="Rexburg Idaho Temple at sunset" loading="lazy" width="600" height="400">
        <figcaption>Rexburg Idaho Temple</figcaption>
      </figure>

    </div>
  </main>

  <footer>
    <p>&copy; <span id="current-year"></span> – Abraham Lopez – WDD 131</p>
    <p>Last Modified: <span id="last-modified"></span></p>
  </footer>

</body>
</html>
